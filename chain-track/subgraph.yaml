specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: CRXFactory
    network: sepolia
    source:
      address: "0x94D9Dd2ACB1a6b72c55D3D0eCB6e4682D68C0014"
      abi: CRXFactory
      startBlock: 10562636
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SupplyChainCreated
      abis:
        - name: CRXFactory
          file: ./abis/CRXFactory.json
      eventHandlers:
        - event: SupplyChainCreated(indexed address,indexed address,string,uint256)
          handler: handleSupplyChainCreated
      file: ./src/crx-factory.ts
